<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Онлайн запись - Флора</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .time-slot {
            padding: 12px;
            margin: 5px;
            border: 1px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            background: white;
            transition: 0.3s;
            text-align: center;
            user-select: none;
        }
        
        .time-slot:hover:not(.booked) {
            background: #800020;
            color: white;
        }
        
        .time-slot.booked {
            background: #f0f0f0;
            color: #999;
            cursor: not-allowed;
            text-decoration: line-through;
        }
        
        .time-slot.selected {
            background: #800020;
            color: white;
        }
        
        #timeSlots {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin: 20px 0;
        }
        
        body {
            display: none;
        }
    </style>
</head>
<body>

<header class="header">
    <div class="logo">Флора</div>
    <nav class="nav">
        <a href="index.html">Главная</a>
        <a href="about.html">О нас</a>
        <a href="services.html">Услуги</a>
        <a href="team.html">Команда</a>
        <a href="profile.html">Профиль</a>
    </nav>
    <a href="booking.html" class="btn-hero">Записаться</a>
</header>

<section class="booking">
    <h2>Онлайн запись</h2>

    <form id="bookingForm" class="booking-form">
        <input type="text" id="name" placeholder="Ваше имя" required>
        <input type="tel" id="phone" placeholder="Телефон" required>
        
        <select id="service" required>
            <option value="" disabled selected>Выберите услугу</option>
            <option value="Маникюр">Маникюр</option>
            <option value="Женская стрижка">Женская стрижка</option>
            <option value="Мужская стрижка">Мужская стрижка</option>
            <option value="Окрашивание">Окрашивание</option>
            <option value="Брови">Брови</option>
            <option value="Пирсинг">Пирсинг</option>
        </select>

        <input type="date" id="date" required>
        
        <div id="timeSlots"></div>
        
        <input type="hidden" id="selectedTime">
        
        <button type="submit" class="btn-book">Записаться</button>
    </form>
</section>

<!-- ========================================== -->
<!-- ПОДКЛЮЧЕНИЕ СКРИПТОВ -->
<!-- ========================================== -->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<script>
    console.log('🚀 === СТРАНИЦА ЗАПИСИ ===');
    
    // ==========================================
    // 1. ПРОВЕРКА СЕССИИ
    // ==========================================
    (async function() {
        if (!window.supabase) {
            console.error('❌ Supabase не загружен');
            return;
        }
        
        const { data: { session } } = await window.supabase.auth.getSession();
        
        if (!session) {
            console.log('❌ Нет сессии - редирект');
            window.location.href = 'login.html';
            return;
        }
        
        console.log('✅ Пользователь:', session.user.email);
        document.body.style.display = 'block';
        
        // Подставляем данные профиля в поля формы
        const { data: profile } = await window.supabase
            .from('profiles')
            .select('name, phone')
            .eq('id', session.user.id)
            .maybeSingle();
        
        if (profile) {
            if (profile.name) document.getElementById('name').value = profile.name;
            if (profile.phone) document.getElementById('phone').value = profile.phone;
            console.log('👤 Данные профиля загружены');
        }
        
        // СОЗДАЕМ СЛОТЫ ВРЕМЕНИ
        createTimeSlots();
    })();
    
    // ==========================================
    // 2. СОЗДАНИЕ СЛОТОВ ВРЕМЕНИ
    // ==========================================
    function createTimeSlots() {
        console.log('🎯 Создаем слоты времени...');
        
        const container = document.getElementById('timeSlots');
        
        if (!container) {
            console.error('❌ #timeSlots не найден');
            return;
        }
        
        container.innerHTML = '';
        
        const times = ['09:00', '10:00', '11:00', '12:00', '13:00', '14:00', '15:00', '16:00', '17:00', '18:00', '19:00', '20:00'];
        
        times.forEach(time => {
            const slot = document.createElement('div');
            slot.className = 'time-slot';
            slot.textContent = time;
            slot.dataset.time = time;
            container.appendChild(slot);
        });
        
        console.log('✅ Создано слотов:', container.children.length);
        
        // НАВЕШИВАЕМ ОБРАБОТЧИКИ
        document.querySelectorAll('.time-slot').forEach(slot => {
            slot.addEventListener('click', function(e) {
                handleSlotClick(this);
            });
        });
        
        console.log('✅ Обработчики навешены');
    }
    
    // ==========================================
    // 3. ОБРАБОТКА КЛИКА ПО СЛОТУ
    // ==========================================
    function handleSlotClick(slot) {
        const time = slot.dataset.time;
        console.log('🖱️ Выбрано время:', time);
        
        // Снимаем выделение со всех
        document.querySelectorAll('.time-slot').forEach(s => {
            s.classList.remove('selected');
        });
        
        // Выделяем текущий
        slot.classList.add('selected');
        
        // Сохраняем в скрытое поле
        const hiddenInput = document.getElementById('selectedTime');
        if (hiddenInput) {
            hiddenInput.value = time;
            console.log('✅ Время сохранено:', time);
        }
    }
    
    // ==========================================
    // 4. ОТПРАВКА ФОРМЫ (СО ВСЕМИ ПОЛЯМИ)
    // ==========================================
    document.addEventListener('DOMContentLoaded', function() {
        const form = document.getElementById('bookingForm');
        
        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            console.log('📝 === ОТПРАВКА ФОРМЫ ===');
            
            // Проверяем время
            const time = document.getElementById('selectedTime')?.value;
            if (!time) {
                alert('⏰ Пожалуйста, выберите время!');
                return;
            }
            
            // Проверяем сессию
            const { data: { session } } = await window.supabase.auth.getSession();
            if (!session) {
                alert('⛔ Сессия истекла. Войдите заново.');
                window.location.href = 'login.html';
                return;
            }
            
            // Собираем ВСЕ данные
            const name = document.getElementById('name').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const service = document.getElementById('service').value;
            const date = document.getElementById('date').value;
            
            // Проверяем обязательные поля
            if (!name) {
                alert('👤 Введите ваше имя');
                return;
            }
            if (!phone) {
                alert('📱 Введите телефон');
                return;
            }
            if (!service) {
                alert('💇 Выберите услугу');
                return;
            }
            if (!date) {
                alert('📅 Выберите дату');
                return;
            }
            
            console.log('📦 Данные для записи:', { name, phone, service, date, time });
            
            // ==========================================
            // СОХРАНЯЕМ В БАЗУ (ВСЕ ПОЛЯ)
            // ==========================================
            const { data, error } = await window.supabase
                .from('appointments')
                .insert([{
                    user_id: session.user.id,
                    name: name,
                    phone: phone,
                    service: service,
                    date: date,
                    time: time,
                    status: 'active'
                }]);
            
            if (error) {
                console.error('❌ Ошибка записи:', error);
                alert('❌ Не удалось записаться: ' + error.message);
            } else {
                console.log('✅ Запись создана!', data);
                alert('✅ Вы успешно записаны!');
                window.location.href = 'profile.html';
            }
        });
    });
    
    console.log('🚀 === ВСЕ СКРИПТЫ ЗАГРУЖЕНЫ ===');
</script>

</body>
</html>
