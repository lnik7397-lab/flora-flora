<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Онлайн запись - Флора</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .time-slot {
            padding: 12px;
            margin: 5px;
            border: 1px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            background: white;
            transition: 0.3s;
        }
        .time-slot:hover:not(.booked) {
            background: #800020;
            color: white;
        }
        .time-slot.booked {
            background: #f0f0f0;
            color: #999;
            cursor: not-allowed;
            text-decoration: line-through;
        }
        .time-slot.selected {
            background: #800020;
            color: white;
        }
        #timeSlots {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin: 20px 0;
        }
        
        body {
            display: none;
        }
        .user-info {
            background: #e8f5e9;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }
    </style>
</head>
<body>

<header class="header">
    <div class="logo">Флора</div>
    <nav class="nav">
        <a href="index.html">Главная</a>
        <a href="about.html">О нас</a>
        <a href="services.html">Услуги</a>
        <a href="team.html">Команда</a>
        <a href="profile.html">Профиль</a>
    </nav>
    <a href="booking.html" class="btn-hero">Записаться</a>
</header>

<section class="booking">
    <h2>Онлайн запись</h2>

    <form id="bookingForm" class="booking-form">
        <input type="text" id="name" placeholder="Ваше имя" required>
        <input type="tel" id="phone" placeholder="Телефон" required>
        
        <select id="service" required>
            <option value="" disabled selected>Выберите услугу</option>
            <option value="Маникюр">Маникюр</option>
            <option value="Женская стрижка">Женская стрижка</option>
            <option value="Мужская стрижка">Мужская стрижка</option>
            <option value="Окрашивание">Окрашивание</option>
            <option value="Брови">Брови</option>
            <option value="Пирсинг">Пирсинг</option>
        </select>

        <input type="date" id="date" required>
        
        <div id="timeSlots"></div>
        
        <input type="hidden" id="selectedTime">
        
        <button type="submit" class="btn-book">Записаться</button>
    </form>
</section>

<script>
    console.log('🚀 Загрузка страницы...');
    
   
    const supabaseUrl = 'https://mkmpljmpdizbhokjmkow.supabase.co/rest/v1/';  
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1rbXBsam1wZGl6Ymhva2pta293Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3NTQ5NDgsImV4cCI6MjA5NjMzMDk0OH0.TrMmfS9DzXAO9IPYzLpMIR_LCEHFCn6PpUcCCEURyTY';              // ← ЗАМЕНИТЕ!
    
    
  
    if (supabaseUrl === 'https://ваш_проект.supabase.co' || supabaseKey === 'ваш_публичный_ключ') {
        console.error('❌ ОШИБКА: Вставьте реальные данные Supabase!');
        document.body.innerHTML = '<h1 style="color:red;text-align:center;margin-top:50px;">❌ Ошибка: настройте Supabase в booking.html</h1>';
        throw new Error('Нет данных Supabase');
    }
    
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
    console.log('✅ Supabase инициализирован');
    
    
    async function checkAuth() {
        try {
            console.log('🔍 Проверяем сессию...');
            const { data: { session }, error } = await supabase.auth.getSession();
            
            if (error) {
                console.error('❌ Ошибка получения сессии:', error);
                window.location.href = 'login.html';
                return;
            }
            
            if (!session) {
                console.log('⛔ Нет сессии, редирект на вход');
                window.location.href = 'login.html';
                return;
            }
            
            console.log('✅ Сессия есть! Пользователь:', session.user.email);
            document.body.style.display = 'block';
            window.currentUserId = session.user.id;
            
        } catch (err) {
            console.error('❌ Критическая ошибка:', err);
            window.location.href = 'login.html';
        }
    }
    
    
    checkAuth();
    
    
    supabase.auth.onAuthStateChange((event, session) => {
        console.log('🔄 Статус авторизации:', event);
        if (event === 'SIGNED_OUT' || !session) {
            window.location.href = 'login.html';
        }
    });
    
    console.log('✅ Скрипт загружен');
</script>


<script src="booking.js"></script>

</body>
</html>
