<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Онлайн запись - Флора</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .time-slot {
            padding: 12px;
            margin: 5px;
            border: 1px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            background: white;
            transition: 0.3s;
        }
        .time-slot:hover:not(.booked) {
            background: #800020;
            color: white;
        }
        .time-slot.booked {
            background: #f0f0f0;
            color: #999;
            cursor: not-allowed;
            text-decoration: line-through;
        }
        .time-slot.selected {
            background: #800020;
            color: white;
        }
        #timeSlots {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin: 20px 0;
        }
        .user-info {
            background: #e8f5e9;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }
        /* ВАЖНО: Скрываем страницу ДО проверки сессии */
        body {
            display: none;
        }
    </style>
</head>
<body>

<header class="header">
    <div class="logo">Флора</div>
    <nav class="nav">
        <a href="index.html">Главная</a>
        <a href="about.html">О нас</a>
        <a href="services.html">Услуги</a>
        <a href="team.html">Команда</a>
        <a href="profile.html">Профиль</a>
    </nav>
    <a href="booking.html" class="btn-hero">Записаться</a>
</header>

<section class="booking">
    <h2>Онлайн запись</h2>

    <form id="bookingForm" class="booking-form">
        <input type="text" id="name" placeholder="Ваше имя" required>
        <input type="tel" id="phone" placeholder="Телефон" required>
        
        <select id="service" required>
            <option value="" disabled selected>Выберите услугу</option>
            <option value="Маникюр">Маникюр</option>
            <option value="Женская стрижка">Женская стрижка</option>
            <option value="Мужская стрижка">Мужская стрижка</option>
            <option value="Окрашивание">Окрашивание</option>
            <option value="Брови">Брови</option>
            <option value="Пирсинг">Пирсинг</option>
        </select>

        <input type="date" id="date" required>
        
        <div id="timeSlots"></div>
        
        <input type="hidden" id="selectedTime">
        
        <button type="submit" class="btn-book">Записаться</button>
    </form>
</section>

<!-- ========================================== -->
<!-- ПОДКЛЮЧЕНИЕ СКРИПТОВ -->
<!-- ========================================== -->

<!-- 1. БИБЛИОТЕКА SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- 2. НАСТРОЙКИ -->
<script src="supabase.js"></script>

<!-- 3. ПРОВЕРКА СЕССИИ (ВАЖНО!) -->
<script>
    console.log('🔍 Проверяем сессию...');
    
    (async function() {
        if (!window.supabase) {
            console.error('❌ Supabase не загружен!');
            return;
        }
        
        const { data: { session } } = await window.supabase.auth.getSession();
        
        if (!session) {
            console.log('❌ Нет сессии - редирект на login.html');
            window.location.href = 'login.html';
            return;
        }
        
        console.log('✅ Пользователь:', session.user.email);
        
        // ПОКАЗЫВАЕМ СТРАНИЦУ
        document.body.style.display = 'block';
        
        // ЗАГРУЖАЕМ ДАННЫЕ ПРОФИЛЯ
        const { data: profile } = await window.supabase
            .from('profiles')
            .select('name, phone')
            .eq('id', session.user.id)
            .maybeSingle();
        
        if (profile) {
            if (profile.name) document.getElementById('name').value = profile.name;
            if (profile.phone) document.getElementById('phone').value = profile.phone;
            console.log('👤 Данные профиля загружены');
        }
    })();
</script>

<!-- 4. ЛОГИКА СЛОТОВ ВРЕМЕНИ -->
<script src="booking.js"></script>

</body>
</html>
