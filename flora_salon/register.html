<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация | Флора</title>
    <link rel="stylesheet" href="register.css">
</head>
<body>
<div class="overlay">
    <div class="register-card">
        <h1>Флора</h1>
        <p class="subtitle">Создание личного кабинета</p>

        <form id="registerForm">
            <input id="name" type="text" placeholder="Ваше имя" required>
            <input id="phone" type="tel" placeholder="Номер телефона" required>
            <input id="email" type="email" placeholder="E-mail" required>
            <input id="password1" type="password" placeholder="Пароль" required>
            <input id="password2" type="password" placeholder="Повторите пароль" required>
            <button type="submit">Зарегистрироваться</button>
        </form>

        <p class="login-link">
            Уже есть аккаунт?
            <a href="login.html">Войти</a>
        </p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="register.js"></script>
</body>
</html>
