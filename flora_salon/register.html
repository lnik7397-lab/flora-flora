<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация | Флора</title>

    <link rel="stylesheet" href="register.css">
</head>
<body>

<div class="overlay">

    <div class="register-card">

        <h1>Флора</h1>

        <p class="subtitle">
            Создание личного кабинета
        </p>

        <form id="registerForm">

            <input
                type="text"
                placeholder="Ваше имя"
                required
            >

            <input
                type="tel"
                placeholder="Номер телефона"
                required
            >

            <input
                type="email"
                placeholder="E-mail"
                required
            >

            <input
                type="password"
                placeholder="Пароль"
                required
            >

            <input
                type="password"
                placeholder="Повторите пароль"
                required
            >

            <button type="submit">
                Зарегистрироваться
            </button>

        </form>

        <p class="login-link">
            Уже есть аккаунт?
            <a href="login.html">
                Войти
            </a>
        </p>

    </div>

</div>

</body>
</html>
