<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Личный кабинет | Флора</title>
<link rel="stylesheet" href="profile.css">
</head>
<body>

<header class="header">
    <div class="logo">Флора</div>
    <nav class="nav">
        <a href="index.html">Главная</a>
        <a href="about.html">О нас</a>
        <a href="services.html">Услуги</a>
        <a href="team.html">Команда</a>
        <a href="profile.html">Профиль</a>
    </nav>
</header>

<section class="profile-section">
    <div class="profile-container">
        <div class="welcome">
            <div class="avatar" id="userAvatar">👤</div>
            <div>
                <h1>Добро пожаловать!</h1>
                <p>Ваш личный кабинет Флора</p>
            </div>
        </div>

        <div class="cards">
            <div class="card">
                <h2>Мои данные</h2>
                <p><b>Имя:</b> <span id="userName"></span></p>
                <p><b>Email:</b> <span id="userEmail"></span></p>
                <p><b>Телефон:</b> <span id="userPhone"></span></p>
            </div>

            <div class="card">
                <h2>Ближайшая запись</h2>
                <p><b>Услуга:</b> <span id="service"></span></p>
                <p><b>Дата:</b> <span id="date"></span></p>
                <p><b>Время:</b> <span id="time"></span></p>
            </div>
        </div>

        <div class="buttons">
            <button id="bookingAgainBtn" class="btn">Записаться снова</button>
            <button id="logoutBtn" class="btn logout">Выйти</button>
        </div>
    </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="profile.js"></script>
</body>
</html>
